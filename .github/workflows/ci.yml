# ─────────────────────────────────────────────────────────────────────────────
# CONDUIT — Continuous Integration
#
# Triggers:
#   push  → main, develop
#   PR    → main
#
# Jobs:
#   1. lint        — ruff syntax check (no external deps needed)
#   2. unit        — pricing + inventory + agent tests (no DB, no LLM)
#   3. integration — API endpoint tests (spins up real postgres)
#
# Notes:
#   - unit tests run WITHOUT postgres (fast, isolated)
#   - integration tests run WITH postgres service container
#   - LLM/Pinecone tests are skipped in CI (marked @pytest.mark.slow)
#   - Secrets: OPENAI_API_KEY and PINECONE_API_KEY are set but not
#     used in CI — they satisfy config validation without real calls
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ── JOB 1: LINT ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check agents/ api/ tools/ database/ app_logging/ orchestrator.py config.py \
            --ignore E501,E402,F401,F841,E711,E712,W291,W293,E303,F811 \
            --exclude __pycache__


  # ── JOB 2: UNIT TESTS ───────────────────────────────────────────────────────
  unit-tests:
    name: Unit & Agent Tests (no DB)
    runs-on: ubuntu-latest
    needs: lint

    env:
      # Satisfy config.py validation — not used for real calls in unit tests
      OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
      PINECONE_API_KEY:  ${{ secrets.PINECONE_API_KEY }}
      DATABASE_URL:      postgresql://conduit_user:conduit_pass@localhost:5432/conduit
      ENVIRONMENT:       test
      HITL_ENABLED:      "false"
      AUTO_APPROVE_THRESHOLD: "50000"
      ADVISOR_PIN:       "1234"
      LOG_LEVEL:         WARNING
      LOG_TO_FILE:       "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ tests/agents/ \
            -v \
            --tb=short \
            -m "not slow" \
            --junitxml=reports/unit-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: reports/unit-results.xml


  # ── JOB 3: INTEGRATION TESTS ────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (with postgres)
    runs-on: ubuntu-latest
    needs: unit-tests

    # Postgres service container — same config as local docker-compose
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     conduit_user
          POSTGRES_PASSWORD: conduit_pass
          POSTGRES_DB:       conduit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conduit_user -d conduit"
          --health-interval 10s
          --health-timeout  5s
          --health-retries  5

    env:
      OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
      PINECONE_API_KEY:  ${{ secrets.PINECONE_API_KEY }}
      DATABASE_URL:      postgresql://conduit_user:conduit_pass@localhost:5432/conduit
      ENVIRONMENT:       test
      HITL_ENABLED:      "false"
      AUTO_APPROVE_THRESHOLD: "50000"
      ADVISOR_PIN:       "1234"
      LOG_LEVEL:         WARNING
      LOG_TO_FILE:       "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for postgres
        run: |
          until pg_isready -h localhost -U conduit_user -d conduit; do
            echo "Waiting for postgres..."
            sleep 2
          done
          echo "Postgres is ready"

      - name: Run alembic migrations
        run: alembic upgrade head

      - name: Seed inventory + vehicles
        run: python data/synthetic/generate_all.py
        # Note: Pinecone seed (data/seed/load_pinecone.py) skipped in CI —
        # requires real OpenAI + Pinecone calls. RAG tests use @pytest.mark.slow

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -m "not slow" \
            --junitxml=reports/integration-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: reports/integration-results.xml

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: logs/